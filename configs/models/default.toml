model_provider = "local"
embedding_provider = "local"
chat_model = "local-chat-placeholder"
embedding_model = "local-embedding-placeholder"
temperature = 0.2
max_tokens = 512
request_timeout_seconds = 30.0
max_retries = 2

[routing]
strategy = "single_provider"
fallback_order = ["local", "openai"]
enable_fallback = false

[openai]
base_url = "https://api.openai.com/v1"
organization = ""
project = ""

[anthropic]
enabled = false
api_base = "https://api.anthropic.com"

[gemini]
enabled = false
api_base = "https://generativelanguage.googleapis.com"

[local]
chat_model = "local-chat-placeholder"
embedding_model = "local-embedding-placeholder"
embedding_dimensions = 8
response_prefix = "[local]"

[safety]
require_citation_trace = true
allow_unverified_assertions = false